version: '3.8'

services:
  {{ name }}:
    build: .
    container_name: {{ name }}
    ports:
      - "8000:8000"
    environment:
      - AGENT_NAME={{ name }}
      - LOG_LEVEL=INFO
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
